<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summary</title>
    <script type="module" src="/src/main.ts" defer></script>
</head>

<body>
    <div class="container">

        <div class="summary_title d-flex justify-content-between my-2">
            <a href="/index.html">
                <button class="btn btn-outline-primary">Back</button>
            </a>
            <button class="btn btn-outline782-dark" id="print_mode_btn">
                Print Report
            </button>

        </div>

        <h3>PMC Summary</h3>

        <hr>

        <div class="container mt-3 summary-cont">
            <div class="row">
                <div class="col px-2 border-end">
                    <div>
                        <p>Timeline:
                            <span id="active_filters">None</span>
                        </p>
                        <p>Total Clients:
                            <span id="total_clients_year">0</span>
                        </p>
                    </div>
                </div>
                <div class="col px-2 border-end">
                    <p class="fw-bold">Sex:</p>
                    <ul>
                        <li>
                            <p>
                                <span class="list_name">Female:</span>
                                <span id="female_count">0</span>
                            </p>
                        </li>
                        <li>

                            <p>
                                <span class="list_name">Male:</span>
                                <span id="male_count">0</span>
                            </p>
                        </li>
                    </ul>
                </div>
                <div class="col px-2">
                    <p class="fw-bold">Age Group:</p>
                    <ul>
                        <li>
                            <p>
                                <span class="list_name">0-17:</span>
                                <span id="age_1">0</span>
                            </p>
                        </li>
                        <li>
                            <p>
                                <span class="list_name">18-25:</span>
                                <span id="age_2">0</span>
                            </p>
                        </li>
                        <li>
                            <p>
                                <span class="list_name">26-40:</span>
                                <span id="age_3">0</span>
                            </p>
                        </li>
                        <li>
                            <p>
                                <span class="list_name">41-59:</span>
                                <span id="age_4">0</span>
                            </p>
                        </li>
                        <li>
                            <p>
                                <span class="list_name">60+:</span>
                                <span id="age_5">0</span>
                            </p>
                        </li>
                    </ul>

                </div>
            </div>

            <hr>

            <div class="row p-2">
                <p class="fw-bold">Occupation: </p>
                <div class="occupation_list item_list">
                    <ul></ul>
                </div>
            </div>

            <div class="row p-2">
                <p class="fw-bold">Education: </p>
                <div class="education_list item_list">
                    <ul></ul>
                </div>
            </div>

            <div class="row p-2">
                <p class="fw-bold">Address: </p>
                <div class="address_list item_list">
                    <ul></ul>
                </div>
            </div>


        </div>

    </div>
</body>

</html>
